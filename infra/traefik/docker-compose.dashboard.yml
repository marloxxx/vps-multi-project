# Optional: publish Traefik dashboard on TRAEFIK_DASHBOARD_HOST with TLS.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dashboard.yml --env-file ../../.env up -d
# Set TRAEFIK_DASHBOARD_HOST and TRAEFIK_DASHBOARD_AUTH (htpasswd) in root .env.

services:
  traefik:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
